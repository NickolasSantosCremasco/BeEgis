<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BeEgis - Emergência</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/emergency.css">
</head>
<body class="emergency-page">
    <div id="app-container" style="background-color: #E57D7D;"> <header>
            <button class="btn-voltar" onclick="window.location.href='../../index.html'">
                ← CLIQUE PARA VOLTAR
            </button>
        </header>

        <main class="screen">
            <h1 style="color: white;">Eita! Com o que você precisa de ajuda?</h1>
            
            <div class="button-grid">
                <button class="btn btn-emergency-action" onclick="alertar('filho')">
                    <span class="icon">👤</span> 
                    <div>
                        <strong>FALAR COM FILHO(A)</strong>
                        <p style="font-size: 1rem; margin: 0;">Ligação de vídeo ou voz</p>
                    </div>
                </button>
                
                <button class="btn btn-emergency-action" onclick="alertar('ambulancia')" style="background-color: #ffffff; color: #E57D7D;">
                    <span class="icon">🚑</span> 
                    <strong>CHAMAR AMBULÂNCIA</strong>
                </button>
            </div>

            <p class="footer-alert">
                Caso não haja resposta em 30 segundos, seu filho será notificado automaticamente.
            </p>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="../src/script.js"></script>
    <script>
        // Animação de Alerta com GSAP
        gsap.from(".btn-emergency-action", {
            duration: 0.5,
            scale: 0.8,
            opacity: 0,
            stagger: 0.2,
            ease: "back.out(2)"
        });

        // Função de exemplo para o alerta
        function alertar(tipo) {
            alert("Enviando alerta de " + tipo + " para o servidor BeEgis...");
            // Aqui depois conectaremos com seu FastAPI em Python!
        }
    </script>
</body>
</html>
